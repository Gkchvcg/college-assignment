<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

h1{
    margin-top:30px;
}

#weather-container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    width:200px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.temp{
    font-size:28px;
    font-weight:bold;
}

.emoji{
    font-size:40px;
}

#error{
    color:red;
    font-size:18px;
}

#loader{
    font-size:20px;
    margin-top:20px;
}

.spinner{
    width:40px;
    height:40px;
    border:5px solid #ddd;
    border-top:5px solid #333;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<h1>🌤 Weather Dashboard</h1>

<div id="loader">
<div class="spinner"></div>
<p>Loading weather...</p>
</div>

<div id="weather-container"></div>

<script>

const cities = [
    {name:"Delhi", lat:28.6139, lon:77.2090},
    {name:"Mumbai", lat:19.0760, lon:72.8777},
    {name:"London", lat:51.5072, lon:-0.1276}
];

const container = document.getElementById("weather-container");
const loader = document.getElementById("loader");

function getWeatherEmoji(code){

    if(code === 0) return "☀️";
    if(code <= 3) return "⛅";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧";
    if(code <= 77) return "❄️";
    return "🌦";

}

async function fetchWeather(){

    try{

        const requests = cities.map(city =>
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`)
            .then(res => res.json())
        );

        const results = await Promise.all(requests);

        loader.style.display = "none";

        results.forEach((data,index)=>{

            const weather = data.current_weather;

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <h2>${cities[index].name}</h2>
                <div class="emoji">${getWeatherEmoji(weather.weathercode)}</div>
                <div class="temp">${weather.temperature}°C</div>
                <p>Wind: ${weather.windspeed} km/h</p>
            `;

            container.appendChild(card);

        });

    }
    catch(error){

        loader.style.display = "none";

        container.innerHTML = `<p id="error">❌ Failed to fetch weather data</p>`;

    }

}

fetchWeather();

</script>

</body>
</html>
